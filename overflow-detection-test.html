<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>组件溢出检测工具 - 测试页面</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      min-height: 100vh;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      padding: 30px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }
    
    .header p {
      font-size: 1.1rem;
      opacity: 0.9;
    }
    
    .control-panel {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    
    .control-card {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      transition: all 0.3s ease;
    }
    
    .control-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }
    
    .control-card h3 {
      margin-top: 0;
      margin-bottom: 15px;
      font-size: 1.2rem;
    }
    
    .button {
      background: linear-gradient(45deg, #ff6b6b, #ee5a24);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      display: block;
      width: 100%;
      margin-bottom: 10px;
    }
    
    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
    }
    
    .button.secondary {
      background: linear-gradient(45deg, #3742fa, #2f3542);
    }
    
    .button.secondary:hover {
      box-shadow: 0 4px 15px rgba(55, 66, 250, 0.4);
    }
    
    .status {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      font-family: monospace;
      font-size: 0.9rem;
      line-height: 1.4;
    }
    
    .results {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      padding: 20px;
      margin-top: 20px;
      max-height: 500px;
      overflow-y: auto;
    }
    
    .results h3 {
      margin-top: 0;
      color: #ff6b6b;
    }
    
    .issue-item {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 5px;
      padding: 10px;
      margin-bottom: 10px;
      border-left: 4px solid #ff6b6b;
    }
    
    .issue-item.warning {
      border-left-color: #ffa502;
    }
    
    .issue-item.info {
      border-left-color: #3742fa;
    }
    
    .hidden {
      display: none;
    }
    
    iframe {
      width: 100%;
      height: 600px;
      border: none;
      border-radius: 10px;
      background: white;
      margin-top: 20px;
    }
    
    .viewport-controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }
    
    .viewport-btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.3s ease;
    }
    
    .viewport-btn:hover,
    .viewport-btn.active {
      background: rgba(255, 255, 255, 0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔍 组件溢出检测工具</h1>
      <p>检测组件内元素被外框遮挡导致显示不完全的问题</p>
    </div>
    
    <div class="status" id="status">
      📊 系统就绪，请选择检测功能...
    </div>
    
    <div class="control-panel">
      <div class="control-card">
        <h3>🎯 基础检测</h3>
        <button class="button" onclick="loadApp()">加载应用页面</button>
        <button class="button secondary" onclick="runBasicDetection()">运行基础检测</button>
        <button class="button secondary" onclick="startRealTimeMonitoring()">开始实时监控</button>
      </div>
      
      <div class="control-card">
        <h3>📱 响应式测试</h3>
        <div class="viewport-controls">
          <button class="viewport-btn" onclick="setViewport(320, 568)">Mobile S</button>
          <button class="viewport-btn" onclick="setViewport(375, 667)">Mobile M</button>
          <button class="viewport-btn" onclick="setViewport(768, 1024)">Tablet</button>
          <button class="viewport-btn" onclick="setViewport(1024, 768)">Desktop</button>
        </div>
        <button class="button" onclick="testAllBreakpoints()">测试所有断点</button>
      </div>
      
      <div class="control-card">
        <h3>🔧 深度分析</h3>
        <button class="button" onclick="detectFixedSizes()">检测固定尺寸</button>
        <button class="button secondary" onclick="analyzeAdaptiveFailures()">分析自适应失效</button>
        <button class="button secondary" onclick="generateFullReport()">生成完整报告</button>
      </div>
      
      <div class="control-card">
        <h3>🎛️ 工具控制</h3>
        <button class="button" onclick="clearHighlights()">清除高亮</button>
        <button class="button secondary" onclick="toggleDevTools()">开发者工具</button>
        <button class="button secondary" onclick="exportResults()">导出结果</button>
      </div>
    </div>
    
    <iframe id="appFrame" class="hidden" src="http://localhost:3002/modern-ranking"></iframe>
    
    <div class="results hidden" id="results">
      <h3>检测结果</h3>
      <div id="resultsContent"></div>
    </div>
  </div>

  <script>
    let currentFrame = null;
    let detectionResults = [];
    
    // 加载应用页面
    function loadApp() {
      updateStatus('📱 正在加载应用页面...');
      const iframe = document.getElementById('appFrame');
      iframe.classList.remove('hidden');
      
      iframe.onload = function() {
        currentFrame = iframe.contentWindow;
        updateStatus('✅ 应用页面加载完成，正在注入检测工具...');
        
        // 注入检测脚本
        fetch('/component-overflow-detector.js')
          .then(response => response.text())
          .then(script => {
            const scriptElement = currentFrame.document.createElement('script');
            scriptElement.textContent = script;
            currentFrame.document.head.appendChild(scriptElement);
            updateStatus('🔧 检测工具注入完成，可以开始检测');
          })
          .catch(error => {
            updateStatus('❌ 检测工具注入失败: ' + error.message);
          });
      };
    }
    
    // 运行基础检测
    function runBasicDetection() {
      if (!currentFrame) {
        updateStatus('❌ 请先加载应用页面');
        return;
      }
      
      updateStatus('🔍 正在运行基础溢出检测...');
      
      try {
        const results = currentFrame.overflowDetector.generateDetailedReport();
        detectionResults.push(results);
        displayResults('基础检测', results);
        updateStatus(`✅ 基础检测完成，发现 ${results.totalIssues} 个问题`);
      } catch (error) {
        updateStatus('❌ 基础检测失败: ' + error.message);
      }
    }
    
    // 开始实时监控
    function startRealTimeMonitoring() {
      if (!currentFrame) {
        updateStatus('❌ 请先加载应用页面');
        return;
      }
      
      updateStatus('👁️ 开始实时监控组件变化...');
      
      try {
        currentFrame.overflowDetector.startRealTimeMonitoring();
        updateStatus('✅ 实时监控已启动，调整窗口大小可触发检测');
      } catch (error) {
        updateStatus('❌ 实时监控启动失败: ' + error.message);
      }
    }
    
    // 设置视口大小
    function setViewport(width, height) {
      if (!currentFrame) {
        updateStatus('❌ 请先加载应用页面');
        return;
      }
      
      const iframe = document.getElementById('appFrame');
      iframe.style.width = width + 'px';
      iframe.style.height = height + 'px';
      
      // 更新按钮状态
      document.querySelectorAll('.viewport-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      
      updateStatus(`📏 视口已设置为 ${width}x${height}`);
      
      // 等待重新渲染后检测
      setTimeout(() => {
        runBasicDetection();
      }, 500);
    }
    
    // 测试所有断点
    async function testAllBreakpoints() {
      if (!currentFrame) {
        updateStatus('❌ 请先加载应用页面');
        return;
      }
      
      updateStatus('📱 正在测试所有响应式断点...');
      
      try {
        const results = await currentFrame.adaptiveDetector.testResponsiveBreakpoints();
        detectionResults.push({
          type: 'breakpoint-test',
          results: results,
          timestamp: new Date().toISOString()
        });
        
        displayBreakpointResults(results);
        updateStatus(`✅ 断点测试完成，测试了 ${results.length} 个有问题的断点`);
      } catch (error) {
        updateStatus('❌ 断点测试失败: ' + error.message);
      }
    }
    
    // 检测固定尺寸
    function detectFixedSizes() {
      if (!currentFrame) {
        updateStatus('❌ 请先加载应用页面');
        return;
      }
      
      updateStatus('🔍 正在检测固定尺寸使用...');
      
      try {
        const results = currentFrame.adaptiveDetector.detectFixedSizeUsage();
        detectionResults.push({
          type: 'fixed-size-detection',
          results: results,
          timestamp: new Date().toISOString()
        });
        
        displayFixedSizeResults(results);
        updateStatus(`✅ 固定尺寸检测完成，发现 ${results.length} 个问题`);
      } catch (error) {
        updateStatus('❌ 固定尺寸检测失败: ' + error.message);
      }
    }
    
    // 分析自适应失效
    function analyzeAdaptiveFailures() {
      updateStatus('🔬 正在分析自适应失效模式...');
      
      // 这里可以添加更复杂的分析逻辑
      const analysisResults = {
        patterns: [
          '固定像素值使用过多',
          'min-width: 0 缺失',
          'clamp() 函数参数不合理',
          '文本溢出处理不当'
        ],
        recommendations: [
          '统一使用响应式单位',
          '优化flex布局配置',
          '实现智能文本截断',
          '添加内容提示功能'
        ]
      };
      
      displayAnalysisResults(analysisResults);
      updateStatus('✅ 自适应失效分析完成');
    }
    
    // 生成完整报告
    function generateFullReport() {
      if (detectionResults.length === 0) {
        updateStatus('❌ 没有检测结果，请先运行检测');
        return;
      }
      
      updateStatus('📊 正在生成完整报告...');
      
      const report = {
        timestamp: new Date().toISOString(),
        totalDetections: detectionResults.length,
        results: detectionResults,
        summary: generateReportSummary()
      };
      
      displayFullReport(report);
      updateStatus('✅ 完整报告生成完成');
    }
    
    // 清除高亮
    function clearHighlights() {
      if (!currentFrame) {
        updateStatus('❌ 请先加载应用页面');
        return;
      }
      
      try {
        const highlights = currentFrame.document.querySelectorAll('.overflow-issue-highlight');
        highlights.forEach(el => el.remove());
        updateStatus('✅ 已清除所有高亮标记');
      } catch (error) {
        updateStatus('❌ 清除高亮失败: ' + error.message);
      }
    }
    
    // 切换开发者工具
    function toggleDevTools() {
      if (!currentFrame) {
        updateStatus('❌ 请先加载应用页面');
        return;
      }
      
      updateStatus('🛠️ 请在浏览器中手动打开开发者工具');
    }
    
    // 导出结果
    function exportResults() {
      if (detectionResults.length === 0) {
        updateStatus('❌ 没有检测结果可导出');
        return;
      }
      
      const data = JSON.stringify(detectionResults, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      
      const a = document.createElement('a');
      a.href = url;
      a.download = `overflow-detection-${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      
      URL.revokeObjectURL(url);
      updateStatus('✅ 检测结果已导出');
    }
    
    // 更新状态显示
    function updateStatus(message) {
      document.getElementById('status').textContent = message;
      console.log(message);
    }
    
    // 显示检测结果
    function displayResults(title, results) {
      const resultsDiv = document.getElementById('results');
      const contentDiv = document.getElementById('resultsContent');
      
      resultsDiv.classList.remove('hidden');
      
      const resultHtml = `
        <div class="issue-item">
          <h4>${title} - ${new Date().toLocaleString()}</h4>
          <p><strong>总问题数:</strong> ${results.totalIssues}</p>
          <p><strong>问题分类:</strong></p>
          <ul>
            <li>水平溢出: ${results.categories.horizontal}</li>
            <li>垂直溢出: ${results.categories.vertical}</li>
            <li>内容被裁剪: ${results.categories.clipped}</li>
            <li>可滚动内容: ${results.categories.scrollable}</li>
          </ul>
          ${results.summary.map(item => `<p>${item}</p>`).join('')}
        </div>
      `;
      
      contentDiv.innerHTML = resultHtml + contentDiv.innerHTML;
    }
    
    // 显示断点测试结果
    function displayBreakpointResults(results) {
      const resultsDiv = document.getElementById('results');
      const contentDiv = document.getElementById('resultsContent');
      
      resultsDiv.classList.remove('hidden');
      
      const resultHtml = `
        <div class="issue-item warning">
          <h4>响应式断点测试 - ${new Date().toLocaleString()}</h4>
          <p><strong>测试断点数:</strong> ${results.length}</p>
          ${results.map(result => `
            <div style="margin: 10px 0; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 5px;">
              <strong>${result.breakpoint.name} (${result.breakpoint.width}x${result.breakpoint.height})</strong>
              <br>溢出问题: ${result.overflowIssues.length} 个
              <br>自适应问题: ${result.adaptiveIssues.length} 个
            </div>
          `).join('')}
        </div>
      `;
      
      contentDiv.innerHTML = resultHtml + contentDiv.innerHTML;
    }
    
    // 显示固定尺寸检测结果
    function displayFixedSizeResults(results) {
      const resultsDiv = document.getElementById('results');
      const contentDiv = document.getElementById('resultsContent');
      
      resultsDiv.classList.remove('hidden');
      
      const resultHtml = `
        <div class="issue-item info">
          <h4>固定尺寸检测 - ${new Date().toLocaleString()}</h4>
          <p><strong>发现问题:</strong> ${results.length} 个组件</p>
          ${results.map(result => `
            <div style="margin: 10px 0; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 5px;">
              <strong>${result.selector}</strong>
              <br>问题数: ${result.issues.length}
              ${result.issues.map(issue => `
                <br>• ${issue.property}: ${issue.value} → ${issue.recommendation}
              `).join('')}
            </div>
          `).join('')}
        </div>
      `;
      
      contentDiv.innerHTML = resultHtml + contentDiv.innerHTML;
    }
    
    // 显示分析结果
    function displayAnalysisResults(results) {
      const resultsDiv = document.getElementById('results');
      const contentDiv = document.getElementById('resultsContent');
      
      resultsDiv.classList.remove('hidden');
      
      const resultHtml = `
        <div class="issue-item">
          <h4>自适应失效分析 - ${new Date().toLocaleString()}</h4>
          <p><strong>发现的模式:</strong></p>
          <ul>${results.patterns.map(pattern => `<li>${pattern}</li>`).join('')}</ul>
          <p><strong>修复建议:</strong></p>
          <ul>${results.recommendations.map(rec => `<li>${rec}</li>`).join('')}</ul>
        </div>
      `;
      
      contentDiv.innerHTML = resultHtml + contentDiv.innerHTML;
    }
    
    // 显示完整报告
    function displayFullReport(report) {
      const resultsDiv = document.getElementById('results');
      const contentDiv = document.getElementById('resultsContent');
      
      resultsDiv.classList.remove('hidden');
      
      const resultHtml = `
        <div class="issue-item" style="border-left-color: #2ed573;">
          <h4>📊 完整检测报告 - ${new Date(report.timestamp).toLocaleString()}</h4>
          <p><strong>检测次数:</strong> ${report.totalDetections}</p>
          <p><strong>报告摘要:</strong></p>
          ${report.summary.map(item => `<p>• ${item}</p>`).join('')}
          <details style="margin-top: 15px;">
            <summary style="cursor: pointer; font-weight: bold;">详细数据</summary>
            <pre style="background: rgba(0,0,0,0.3); padding: 10px; border-radius: 5px; margin-top: 10px; font-size: 0.8rem; overflow-x: auto;">${JSON.stringify(report, null, 2)}</pre>
          </details>
        </div>
      `;
      
      contentDiv.innerHTML = resultHtml + contentDiv.innerHTML;
    }
    
    // 生成报告摘要
    function generateReportSummary() {
      return [
        '检测工具已完成多轮分析',
        '发现组件内元素溢出和自适应问题',
        '建议优先修复水平溢出问题',
        '推荐使用响应式单位替换固定值',
        '需要为长文本添加智能处理'
      ];
    }
    
    // 页面加载完成后自动加载应用
    window.addEventListener('load', function() {
      updateStatus('🚀 检测工具页面加载完成');
    });
  </script>
</body>
</html>
