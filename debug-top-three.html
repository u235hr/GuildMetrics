<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前三名卡片样式调试</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 从globals.css复制的关键样式 */
        .top-three-section {
            flex: 0 0 auto;
            width: 100%;
            overflow: visible;
        }
        
        .top-three-card {
            position: relative;
            height: 100%;
            min-height: clamp(80px, 12vh, 120px);
            perspective: 1000px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 255, 0.7) 100%);
            backdrop-filter: blur(15px);
            border-radius: clamp(0.75rem, 2vw, 1.25rem);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: clamp(1rem, 3vw, 2rem);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        
        .top-three-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.15);
        }
        
        .top-three-card.rank-1 {
            transform: scale(1.1);
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2) 0%, rgba(255, 255, 255, 0.9) 100%);
            border-color: rgba(255, 215, 0, 0.3);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-blue-900 to-indigo-900 min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-white text-center mb-8">前三名卡片样式测试</h1>
        
        <!-- 使用Tailwind CSS的前三名布局 -->
        <div class="w-full h-96 flex flex-col">
            <div class="text-center mb-4 flex-shrink-0">
                <h2 class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent mb-1">
                    🏆 月度之星
                </h2>
                <p class="text-gray-300 text-sm">
                    金银铜版最佳主播
                </p>
            </div>
            
            <div class="flex-1 grid grid-cols-3 gap-4 items-stretch">
                <!-- 亚军 (左) -->
                <div class="h-full">
                    <div class="relative h-full scale-100 z-20">
                        <div class="relative overflow-visible border-2 h-full shadow-lg backdrop-blur-sm bg-gradient-to-br from-gray-50 via-slate-50 to-gray-100 border-gray-400 shadow-gray-200 rounded-lg">
                            <!-- 装饰性背景 -->
                            <div class="absolute inset-0 opacity-5">
                                <div class="absolute -top-1 -right-1 w-12 h-12 rounded-full bg-gradient-to-br from-gray-400 via-slate-500 to-gray-600"></div>
                                <div class="absolute -bottom-1 -left-1 w-8 h-8 rounded-full bg-gradient-to-br from-gray-400 via-slate-500 to-gray-600"></div>
                            </div>
                            
                            <!-- 排名徽章 -->
                            <div class="absolute -top-2 -right-2 z-10">
                                <div class="w-8 h-8 rounded-full flex items-center justify-center shadow-md bg-gradient-to-br from-gray-400 via-slate-500 to-gray-600">
                                    <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24">
                                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                                    </svg>
                                </div>
                            </div>
                            
                            <div class="p-3 relative z-10 h-full flex flex-col justify-center">
                                <div class="text-center space-y-2">
                                    <!-- 名次徽章 -->
                                    <div class="text-white border-0 font-bold px-3 py-1 text-sm mb-1 bg-gradient-to-r from-gray-400 via-slate-500 to-gray-600 rounded-full inline-block">
                                        亚军
                                    </div>
                                    
                                    <!-- 头像 -->
                                    <div class="relative mx-auto">
                                        <div class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-sm shadow-lg bg-gradient-to-br from-gray-400 via-slate-500 to-gray-600">
                                            安
                                        </div>
                                    </div>
                                    
                                    <!-- 主播姓名 -->
                                    <div class="space-y-1">
                                        <h3 class="text-xl font-bold text-gray-800">
                                            StreamerC
                                        </h3>
                                        <p class="text-xs text-gray-500">
                                            ID: StreamerC-2024-7
                                        </p>
                                    </div>
                                    
                                    <!-- 礼物值 -->
                                    <div class="space-y-1">
                                        <div class="text-xl font-mono font-bold text-gray-800">
                                            1,690,826
                                        </div>
                                        <div class="flex items-center justify-center gap-1 text-xs text-green-600">
                                            <span>+15.2%</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 冠军 (中) -->
                <div class="h-full">
                    <div class="relative h-full scale-110 z-30">
                        <div class="relative overflow-visible border-2 h-full shadow-lg backdrop-blur-sm bg-gradient-to-br from-yellow-50 via-amber-50 to-yellow-100 border-yellow-400 shadow-yellow-200 rounded-lg">
                            <!-- 装饰性背景 -->
                            <div class="absolute inset-0 opacity-5">
                                <div class="absolute -top-1 -right-1 w-12 h-12 rounded-full bg-gradient-to-br from-yellow-400 via-amber-500 to-yellow-600"></div>
                                <div class="absolute -bottom-1 -left-1 w-8 h-8 rounded-full bg-gradient-to-br from-yellow-400 via-amber-500 to-yellow-600"></div>
                            </div>
                            
                            <!-- 排名徽章 -->
                            <div class="absolute -top-2 -right-2 z-10">
                                <div class="w-8 h-8 rounded-full flex items-center justify-center shadow-md bg-gradient-to-br from-yellow-400 via-amber-500 to-yellow-600">
                                    <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24">
                                        <path d="M5 16L3 14l5.5-5.5L10 10l4-4 6 6-1.5 1.5L12 7l-2.5 2.5L5 16z"/>
                                    </svg>
                                </div>
                            </div>
                            
                            <!-- 特殊效果 - 仅冠军 -->
                            <div class="absolute top-1 left-1">
                                <svg class="w-3 h-3 text-yellow-500 animate-pulse" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                                </svg>
                            </div>
                            
                            <div class="p-3 relative z-10 h-full flex flex-col justify-center">
                                <div class="text-center space-y-2">
                                    <!-- 名次徽章 -->
                                    <div class="text-white border-0 font-bold px-3 py-1 text-sm mb-1 bg-gradient-to-r from-yellow-400 via-amber-500 to-yellow-600 rounded-full inline-block">
                                        冠军
                                    </div>
                                    
                                    <!-- 头像 -->
                                    <div class="relative mx-auto">
                                        <div class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-sm shadow-lg bg-gradient-to-br from-yellow-400 via-amber-500 to-yellow-600">
                                            小
                                        </div>
                                        <div class="absolute -top-1 -right-1 w-3 h-3 bg-yellow-400 rounded-full flex items-center justify-center">
                                            <svg class="w-2 h-2 text-white" fill="currentColor" viewBox="0 0 24 24">
                                                <path d="M5 16L3 14l5.5-5.5L10 10l4-4 6 6-1.5 1.5L12 7l-2.5 2.5L5 16z"/>
                                            </svg>
                                        </div>
                                    </div>
                                    
                                    <!-- 主播姓名 -->
                                    <div class="space-y-1">
                                        <h3 class="text-xl font-bold text-gray-800">
                                            StreamerQ
                                        </h3>
                                        <p class="text-xs text-gray-500">
                                            ID: StreamerQ-2024-7
                                        </p>
                                    </div>
                                    
                                    <!-- 礼物值 -->
                                    <div class="space-y-1">
                                        <div class="text-xl font-mono font-bold text-gray-800">
                                            2,120,425
                                        </div>
                                        <div class="flex items-center justify-center gap-1 text-xs text-green-600">
                                            <span>+15.2%</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 季军 (右) -->
                <div class="h-full">
                    <div class="relative h-full scale-100 z-10">
                        <div class="relative overflow-visible border-2 h-full shadow-lg backdrop-blur-sm bg-gradient-to-br from-orange-50 via-amber-50 to-orange-100 border-orange-400 shadow-orange-200 rounded-lg">
                            <!-- 装饰性背景 -->
                            <div class="absolute inset-0 opacity-5">
                                <div class="absolute -top-1 -right-1 w-12 h-12 rounded-full bg-gradient-to-br from-orange-400 via-amber-600 to-orange-600"></div>
                                <div class="absolute -bottom-1 -left-1 w-8 h-8 rounded-full bg-gradient-to-br from-orange-400 via-amber-600 to-orange-600"></div>
                            </div>
                            
                            <!-- 排名徽章 -->
                            <div class="absolute -top-2 -right-2 z-10">
                                <div class="w-8 h-8 rounded-full flex items-center justify-center shadow-md bg-gradient-to-br from-orange-400 via-amber-600 to-orange-600">
                                    <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24">
                                        <circle cx="12" cy="12" r="10"/>
                                    </svg>
                                </div>
                            </div>
                            
                            <div class="p-3 relative z-10 h-full flex flex-col justify-center">
                                <div class="text-center space-y-2">
                                    <!-- 名次徽章 -->
                                    <div class="text-white border-0 font-bold px-3 py-1 text-sm mb-1 bg-gradient-to-r from-orange-400 via-amber-600 to-orange-600 rounded-full inline-block">
                                        季军
                                    </div>
                                    
                                    <!-- 头像 -->
                                    <div class="relative mx-auto">
                                        <div class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-sm shadow-lg bg-gradient-to-br from-orange-400 via-amber-600 to-orange-600">
                                            宝
                                        </div>
                                    </div>
                                    
                                    <!-- 主播姓名 -->
                                    <div class="space-y-1">
                                        <h3 class="text-xl font-bold text-gray-800">
                                            StreamerA
                                        </h3>
                                        <p class="text-xs text-gray-500">
                                            ID: StreamerA-2024-7
                                        </p>
                                    </div>
                                    
                                    <!-- 礼物值 -->
                                    <div class="space-y-1">
                                        <div class="text-xl font-mono font-bold text-gray-800">
                                            681,638
                                        </div>
                                        <div class="flex items-center justify-center gap-1 text-xs text-green-600">
                                            <span>+15.2%</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="mt-8 text-center text-white">
            <p>如果您能看到上面三个带有渐变背景和样式的卡片，说明样式正常工作。</p>
            <p>如果卡片没有样式或显示异常，可能是CSS加载问题。</p>
        </div>
    </div>
</body>
</html>
