<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前三名卡片样式调试</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 模拟组件样式 */
        .top-card {
            background: linear-gradient(to bottom right, #fef3c7, #fbbf24, #f59e0b);
            border: 2px solid #f59e0b;
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.3);
        }
        
        .champion-card {
            background: linear-gradient(to bottom right, #fef3c7, #fbbf24, #f59e0b);
            border: 2px solid #f59e0b;
            transform: scale(1.1);
            z-index: 30;
        }
        
        .runner-up-card {
            background: linear-gradient(to bottom right, #f1f5f9, #94a3b8, #64748b);
            border: 2px solid #94a3b8;
            z-index: 20;
        }
        
        .third-place-card {
            background: linear-gradient(to bottom right, #fed7aa, #fb923c, #ea580c);
            border: 2px solid #fb923c;
            z-index: 10;
        }
        
        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: .5;
            }
        }
    </style>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-8 text-gray-800">前三名卡片样式测试</h1>
        
        <!-- 桌面端布局 -->
        <div class="grid grid-cols-3 gap-6 h-80 mb-12">
            <!-- 亚军 -->
            <div class="runner-up-card relative h-full rounded-lg overflow-visible backdrop-blur-sm">
                <!-- 装饰性背景 -->
                <div class="absolute inset-0 opacity-5">
                    <div class="absolute -top-1 -right-1 w-12 h-12 rounded-full bg-gradient-to-br from-gray-400 to-gray-600"></div>
                    <div class="absolute -bottom-1 -left-1 w-8 h-8 rounded-full bg-gradient-to-br from-gray-400 to-gray-600"></div>
                </div>
                
                <!-- 排名徽章 -->
                <div class="absolute -top-2 -right-2 z-10">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center shadow-md bg-gradient-to-br from-gray-400 to-gray-600">
                        <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 2L15.09 8.26L22 9L17 14L18.18 21L12 17.77L5.82 21L7 14L2 9L8.91 8.26L12 2Z"/>
                        </svg>
                    </div>
                </div>
                
                <div class="p-6 relative z-10 h-full flex flex-col justify-center">
                    <div class="text-center space-y-4">
                        <!-- 名次徽章 -->
                        <div class="inline-block bg-gradient-to-r from-gray-400 to-gray-600 text-white border-0 font-bold px-3 py-1 text-sm rounded-full">
                            亚军
                        </div>
                        
                        <!-- 头像 -->
                        <div class="relative mx-auto">
                            <div class="w-12 h-12 rounded-full flex items-center justify-center text-white font-bold text-lg shadow-lg bg-gradient-to-br from-gray-400 to-gray-600">
                                张
                            </div>
                        </div>
                        
                        <!-- 主播姓名 -->
                        <div class="space-y-1">
                            <h3 class="font-bold text-gray-800 text-xl">张三</h3>
                            <p class="text-xs text-gray-600">ID: 12345</p>
                        </div>
                        
                        <!-- 礼物值 -->
                        <div class="space-y-1">
                            <div class="font-mono font-bold text-gray-800 text-xl">85,000</div>
                            <div class="flex items-center justify-center gap-1 text-xs text-green-600">
                                <span>+12.5%</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 冠军 -->
            <div class="champion-card relative h-full rounded-lg overflow-visible backdrop-blur-sm">
                <!-- 装饰性背景 -->
                <div class="absolute inset-0 opacity-5">
                    <div class="absolute -top-1 -right-1 w-12 h-12 rounded-full bg-gradient-to-br from-yellow-400 to-yellow-600"></div>
                    <div class="absolute -bottom-1 -left-1 w-8 h-8 rounded-full bg-gradient-to-br from-yellow-400 to-yellow-600"></div>
                </div>
                
                <!-- 排名徽章 -->
                <div class="absolute -top-2 -right-2 z-10">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center shadow-md bg-gradient-to-br from-yellow-400 to-yellow-600">
                        <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M5 16L3 5l5.5-1L12 10l3.5-6L21 5l-2 11H5zm2.7-2h8.6l.9-5.4-2.1-.4L12 12l-3.1-3.8-2.1.4L8.7 14z"/>
                        </svg>
                    </div>
                </div>
                
                <!-- 特殊效果 - 冠军闪烁星星 -->
                <div class="absolute top-1 left-1">
                    <svg class="w-4 h-4 text-yellow-500 animate-pulse" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2l3.09 6.26L22 9l-5 4.87L18.18 21 12 17.77 5.82 21 7 13.87 2 9l6.91-.74L12 2z"/>
                    </svg>
                </div>
                
                <div class="p-6 relative z-10 h-full flex flex-col justify-center">
                    <div class="text-center space-y-4">
                        <!-- 名次徽章 -->
                        <div class="inline-block bg-gradient-to-r from-yellow-400 to-yellow-600 text-white border-0 font-bold px-3 py-1 text-sm rounded-full">
                            冠军
                        </div>
                        
                        <!-- 头像 -->
                        <div class="relative mx-auto">
                            <div class="w-12 h-12 rounded-full flex items-center justify-center text-white font-bold text-lg shadow-lg bg-gradient-to-br from-yellow-400 to-yellow-600">
                                李
                            </div>
                            <!-- 小皇冠 -->
                            <div class="absolute -top-1 -right-1 w-4 h-4 bg-yellow-400 rounded-full flex items-center justify-center">
                                <svg class="w-2 h-2 text-white" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M5 16L3 5l5.5-1L12 10l3.5-6L21 5l-2 11H5z"/>
                                </svg>
                            </div>
                        </div>
                        
                        <!-- 主播姓名 -->
                        <div class="space-y-1">
                            <h3 class="font-bold text-gray-800 text-xl">李四</h3>
                            <p class="text-xs text-gray-600">ID: 67890</p>
                        </div>
                        
                        <!-- 礼物值 -->
                        <div class="space-y-1">
                            <div class="font-mono font-bold text-gray-800 text-xl">120,000</div>
                            <div class="flex items-center justify-center gap-1 text-xs text-green-600">
                                <span>+18.7%</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 季军 -->
            <div class="third-place-card relative h-full rounded-lg overflow-visible backdrop-blur-sm">
                <!-- 装饰性背景 -->
                <div class="absolute inset-0 opacity-5">
                    <div class="absolute -top-1 -right-1 w-12 h-12 rounded-full bg-gradient-to-br from-orange-400 to-orange-600"></div>
                    <div class="absolute -bottom-1 -left-1 w-8 h-8 rounded-full bg-gradient-to-br from-orange-400 to-orange-600"></div>
                </div>
                
                <!-- 排名徽章 -->
                <div class="absolute -top-2 -right-2 z-10">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center shadow-md bg-gradient-to-br from-orange-400 to-orange-600">
                        <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 6v6l4 2"/>
                        </svg>
                    </div>
                </div>
                
                <div class="p-6 relative z-10 h-full flex flex-col justify-center">
                    <div class="text-center space-y-4">
                        <!-- 名次徽章 -->
                        <div class="inline-block bg-gradient-to-r from-orange-400 to-orange-600 text-white border-0 font-bold px-3 py-1 text-sm rounded-full">
                            季军
                        </div>
                        
                        <!-- 头像 -->
                        <div class="relative mx-auto">
                            <div class="w-12 h-12 rounded-full flex items-center justify-center text-white font-bold text-lg shadow-lg bg-gradient-to-br from-orange-400 to-orange-600">
                                王
                            </div>
                        </div>
                        
                        <!-- 主播姓名 -->
                        <div class="space-y-1">
                            <h3 class="font-bold text-gray-800 text-xl">王五</h3>
                            <p class="text-xs text-gray-600">ID: 11111</p>
                        </div>
                        
                        <!-- 礼物值 -->
                        <div class="space-y-1">
                            <div class="font-mono font-bold text-gray-800 text-xl">75,000</div>
                            <div class="flex items-center justify-center gap-1 text-xs text-green-600">
                                <span>+9.3%</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="text-center text-gray-600">
            <p>如果您看到了彩色的卡片，说明样式正常工作</p>
            <p>如果卡片是黑色或没有样式，说明CSS加载有问题</p>
        </div>
    </div>
</body>
</html>
