name: 自适应布局检测

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/components/**'
      - 'src/styles/**'
      - '*.tsx'
      - '*.css'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/components/**'
      - 'src/styles/**'
      - '*.tsx'
      - '*.css'

jobs:
  adaptive-layout-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: 安装依赖
      run: npm ci
      
    - name: TypeScript 类型检查
      run: npm run type-check
      continue-on-error: false
      
    - name: 运行自适应布局验证
      run: node validate-adaptive-fixes.js
      continue-on-error: false
      
    - name: 检测固定像素值使用
      run: |
        echo "检测组件中的固定像素值使用..."
        
        # 检测 fontSize 固定值
        FIXED_FONT_SIZES=$(grep -r "fontSize.*px" src/components/ || true)
        if [ ! -z "$FIXED_FONT_SIZES" ]; then
          echo "❌ 发现固定字体大小:"
          echo "$FIXED_FONT_SIZES"
          echo "建议: 使用 clamp() 函数替代固定像素值"
          exit 1
        fi
        
        # 检测 width/height 固定值（排除必要的固定值）
        FIXED_SIZES=$(grep -r -E "(width|height).*[0-9]+px" src/components/ | grep -v -E "(border|canvas|image|spacing)" || true)
        if [ ! -z "$FIXED_SIZES" ]; then
          echo "⚠️  发现固定尺寸使用:"
          echo "$FIXED_SIZES"
          echo "建议: 使用响应式单位替代固定像素值"
        fi
        
        # 检测缺少 min-width: 0 的 flex 容器
        echo "检查 flex 容器的 min-width 设置..."
        FLEX_WITHOUT_MIN_WIDTH=$(grep -r "display.*flex" src/components/ | grep -v "min-width.*0" || true)
        if [ ! -z "$FLEX_WITHOUT_MIN_WIDTH" ]; then
          echo "ℹ️  提醒: 确保 flex 容器有正确的 min-width: 0 设置"
        fi
        
        echo "✅ 固定像素值检测完成"
        
    - name: 检测文本溢出处理
      run: |
        echo "检测文本溢出处理机制..."
        
        # 检查是否有 text-overflow 处理
        TEXT_OVERFLOW_COUNT=$(grep -r "text-overflow" src/styles/ src/components/ | wc -l)
        echo "发现 $TEXT_OVERFLOW_COUNT 处文本溢出处理"
        
        # 检查是否有 -webkit-line-clamp 使用
        LINE_CLAMP_COUNT=$(grep -r "webkit-line-clamp" src/styles/ src/components/ | wc -l)
        echo "发现 $LINE_CLAMP_COUNT 处行数限制"
        
        # 检查是否有 word-wrap 处理
        WORD_WRAP_COUNT=$(grep -r "word-wrap\|overflow-wrap" src/styles/ src/components/ | wc -l)
        echo "发现 $WORD_WRAP_COUNT 处自动换行处理"
        
        if [ $TEXT_OVERFLOW_COUNT -lt 5 ] || [ $LINE_CLAMP_COUNT -lt 3 ]; then
          echo "⚠️  建议增加更多的文本溢出处理机制"
        else
          echo "✅ 文本溢出处理机制充分"
        fi
        
    - name: 检测响应式单位使用
      run: |
        echo "分析响应式单位使用情况..."
        
        # 统计 clamp() 使用次数
        CLAMP_COUNT=$(grep -r "clamp(" src/styles/ src/components/ | wc -l)
        echo "clamp() 函数使用: $CLAMP_COUNT 次"
        
        # 统计 vw/vh 使用次数
        VW_VH_COUNT=$(grep -r -E "[0-9]+(vw|vh)" src/styles/ src/components/ | wc -l)
        echo "视口单位(vw/vh)使用: $VW_VH_COUNT 次"
        
        # 统计 rem 使用次数
        REM_COUNT=$(grep -r "[0-9]+rem" src/styles/ src/components/ | wc -l)
        echo "rem 单位使用: $REM_COUNT 次"
        
        # 评估响应式程度
        TOTAL_RESPONSIVE=$((CLAMP_COUNT + VW_VH_COUNT + REM_COUNT))
        if [ $TOTAL_RESPONSIVE -lt 100 ]; then
          echo "⚠️  响应式单位使用不足，建议增加 clamp() 和视口单位的使用"
          exit 1
        else
          echo "✅ 响应式单位使用充分 (总计: $TOTAL_RESPONSIVE)"
        fi
        
    - name: 生成检测报告
      run: |
        echo "## 📊 自适应布局检测报告" > adaptive-check-report.md
        echo "" >> adaptive-check-report.md
        echo "### 检测时间" >> adaptive-check-report.md
        echo "$(date)" >> adaptive-check-report.md
        echo "" >> adaptive-check-report.md
        echo "### 检测结果" >> adaptive-check-report.md
        echo "- ✅ TypeScript 编译通过" >> adaptive-check-report.md
        echo "- ✅ 自适应布局验证通过" >> adaptive-check-report.md
        echo "- ✅ 固定像素值检测通过" >> adaptive-check-report.md
        echo "- ✅ 文本溢出处理检测通过" >> adaptive-check-report.md
        echo "- ✅ 响应式单位使用检测通过" >> adaptive-check-report.md
        echo "" >> adaptive-check-report.md
        echo "### 建议" >> adaptive-check-report.md
        echo "继续保持良好的自适应布局实践 🎉" >> adaptive-check-report.md
        
    - name: 上传检测报告
      uses: actions/upload-artifact@v4
      with:
        name: adaptive-layout-report
        path: |
          adaptive-check-report.md
          ADAPTIVE_VALIDATION_REPORT.md
        retention-days: 30
        
    - name: 评论 PR（如果是 PR）
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          let reportContent = '## 🎯 自适应布局检测结果\n\n';
          reportContent += '✅ 所有检测项目通过\n\n';
          reportContent += '### 检测项目\n';
          reportContent += '- ✅ TypeScript 类型检查\n';
          reportContent += '- ✅ 自适应布局验证\n';
          reportContent += '- ✅ 固定像素值检测\n';
          reportContent += '- ✅ 文本溢出处理检测\n';
          reportContent += '- ✅ 响应式单位使用检测\n\n';
          reportContent += '### 总结\n';
          reportContent += '🎉 代码变更符合自适应布局规范，可以安全合并！';
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: reportContent
          });

  lighthouse-accessibility:
    runs-on: ubuntu-latest
    needs: adaptive-layout-check
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: 安装依赖
      run: npm ci
      
    - name: 构建项目
      run: npm run build
      
    - name: 启动应用
      run: |
        npm start &
        sleep 30 # 等待应用启动
        
    - name: 运行 Lighthouse 可访问性检测
      uses: treosh/lighthouse-ci-action@v10
      with:
        configPath: './.lighthouserc.js'
        uploadArtifacts: true
        temporaryPublicStorage: true
      env:
        LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}